name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --generate-notes

  build-bottle:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: macos-26
            bottle_tag: arm64_tahoe
          - os: macos-15
            bottle_tag: arm64_sequoia
          - os: macos-14
            bottle_tag: arm64_sonoma
    runs-on: ${{ matrix.os }}
    env:
      TAG: ${{ github.ref_name }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up variables
        id: vars
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download source tarball and compute SHA256
        id: source
        run: |
          curl -fsSL -o source.tar.gz \
            "https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(shasum -a 256 source.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create local tap with formula
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha256 }}
        run: |
          TAPDIR="$(brew --repository)/Library/Taps/local/homebrew-solcast-proxy/Formula"
          mkdir -p "$TAPDIR"
          cat > "$TAPDIR/solcast-proxy.rb" <<FORMULA
          class SolcastProxy < Formula
            desc "Caching reverse proxy for the Solcast solar forecast API"
            homepage "https://github.com/${REPO}"
            url "https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"
            sha256 "${SOURCE_SHA}"
            license "MIT"

            depends_on "rust" => :build

            def install
              system "cargo", "install", "--locked", "--root", prefix, "--path", "."
            end

            test do
              assert_match "solcast-proxy", shell_output("#{bin}/solcast-proxy --version")
            end
          end
          FORMULA

      - name: Build bottle
        run: brew install --build-bottle local/solcast-proxy/solcast-proxy

      - name: Package bottle
        run: |
          cd "$RUNNER_TEMP"
          brew bottle \
            --no-rebuild \
            --root-url="https://github.com/${REPO}/releases/download/${TAG}" \
            local/solcast-proxy/solcast-proxy

      - name: Rename bottle to single-dash filename
        run: |
          cd "$RUNNER_TEMP"
          for f in solcast-proxy--*.tar.gz; do
            mv "$f" "${f/solcast-proxy--/solcast-proxy-}"
          done

      - name: Upload bottle to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BOTTLE=$(ls "${RUNNER_TEMP}"/solcast-proxy-*.tar.gz)
          gh release upload "$TAG" "$BOTTLE" --clobber

      - name: Save bottle SHA256
        run: |
          BOTTLE=$(ls "${RUNNER_TEMP}"/solcast-proxy-*.tar.gz)
          SHA=$(shasum -a 256 "$BOTTLE" | awk '{print $1}')
          mkdir -p bottle-sha
          echo "$SHA" > "bottle-sha/${{ matrix.bottle_tag }}"

      - name: Upload SHA256 artifact
        uses: actions/upload-artifact@v4
        with:
          name: bottle-sha-${{ matrix.bottle_tag }}
          path: bottle-sha/

  update-tap:
    needs: build-bottle
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Download source tarball and compute SHA256
        id: source
        run: |
          curl -fsSL -o source.tar.gz \
            "https://github.com/bradleydwyer/solcast-proxy/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(sha256sum source.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Download all bottle SHA256 artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bottle-sha-*
          merge-multiple: true
          path: bottle-shas/

      - name: Read bottle SHA256s
        id: bottles
        run: |
          echo "arm64_tahoe=$(cat bottle-shas/arm64_tahoe)" >> "$GITHUB_OUTPUT"
          echo "arm64_sequoia=$(cat bottle-shas/arm64_sequoia)" >> "$GITHUB_OUTPUT"
          echo "arm64_sonoma=$(cat bottle-shas/arm64_sonoma)" >> "$GITHUB_OUTPUT"

      - name: Check out tap repository
        uses: actions/checkout@v4
        with:
          repository: bradleydwyer/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha256 }}
          ARM64_TAHOE_SHA: ${{ steps.bottles.outputs.arm64_tahoe }}
          ARM64_SEQUOIA_SHA: ${{ steps.bottles.outputs.arm64_sequoia }}
          ARM64_SONOMA_SHA: ${{ steps.bottles.outputs.arm64_sonoma }}
        run: |
          cat > homebrew-tap/Formula/solcast-proxy.rb <<EOF
          class SolcastProxy < Formula
            desc "Caching reverse proxy for the Solcast solar forecast API"
            homepage "https://github.com/bradleydwyer/solcast-proxy"
            url "https://github.com/bradleydwyer/solcast-proxy/archive/refs/tags/${TAG}.tar.gz"
            sha256 "${SOURCE_SHA}"
            license "MIT"

            bottle do
              root_url "https://github.com/bradleydwyer/solcast-proxy/releases/download/${TAG}"
              sha256 cellar: :any_skip_relocation, arm64_tahoe:   "${ARM64_TAHOE_SHA}"
              sha256 cellar: :any_skip_relocation, arm64_sequoia: "${ARM64_SEQUOIA_SHA}"
              sha256 cellar: :any_skip_relocation, arm64_sonoma:  "${ARM64_SONOMA_SHA}"
            end

            depends_on "rust" => :build

            def install
              system "cargo", "install", "--locked", "--root", prefix, "--path", "."
            end

            test do
              assert_match "solcast-proxy", shell_output("#{bin}/solcast-proxy --version")
            end
          end
          EOF

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/solcast-proxy.rb
          git commit -m "Update solcast-proxy to ${TAG}"
          git push
